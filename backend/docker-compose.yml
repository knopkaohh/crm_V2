version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: birka-crm-db
    environment:
      POSTGRES_USER: birka_admin
      POSTGRES_PASSWORD: birka_password_2024
      POSTGRES_DB: birka_crm
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U birka_admin"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:







